    <script src="_framework/blazor.webassembly.js"></script>
    <script>navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' });</script>
    <script>
        // PWA install prompt capture
        window._deferredInstallPrompt = null;
        window.addEventListener('beforeinstallprompt', function (e) {
            e.preventDefault();
            window._deferredInstallPrompt = e;
        });
        window.pwaInstall = {
            isAvailable: function () { return !!window._deferredInstallPrompt; },
            prompt: async function () {
                if (!window._deferredInstallPrompt) return false;
                window._deferredInstallPrompt.prompt();
                var choice = await window._deferredInstallPrompt.userChoice;
                window._deferredInstallPrompt = null;
                return choice.outcome === 'accepted';
            }
        };
    </script>
    <script>
        // Self-healing for PWA cache traps and integrity mismatch errors
        async function healPwaAndReload() {
            console.warn('Self-healing PWA caches...');
            try {
                if ('serviceWorker' in navigator) {
                    const regs = await navigator.serviceWorker.getRegistrations();
                    for (const reg of regs) {
                        await reg.unregister();
                    }
                }
                if ('caches' in window) {
                    const keys = await caches.keys();
                    for (const key of keys) {
                        await caches.delete(key);
                    }
                }
                console.log('Cache cleared successfully. Reloading...');
                window.location.reload(true);
            } catch (err) {
                console.error('Failed to self-heal:', err);
                window.location.reload();
            }
        }

        window.addEventListener('unhandledrejection', function (event) {
            const msg = event.reason && event.reason.message ? event.reason.message : '';
            if (msg.includes('Failed to start platform') || msg.includes('integrity') || msg.includes('dynamically imported module')) {
                event.preventDefault();
                healPwaAndReload();
            }
        });

        window.addEventListener('error', function (event) {
            const msg = event.message || '';
            if (msg.includes('integrity') || msg.includes('Failed to load') || msg.includes('module script') || msg.includes('Unexpected error')) {
                event.preventDefault();
                healPwaAndReload();
            }
        }, true); // Use capture phase to catch script loading errors
    </script>
